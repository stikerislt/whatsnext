services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: whatsnext
      POSTGRES_PASSWORD: whatsnext
      POSTGRES_DB: whatsnext
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U whatsnext -d whatsnext']
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6381:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
