[build]
  command = "npm ci && npm run build -w @whatsnext/shared && npm run build -w @whatsnext/web"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_API_URL = "https://whatsnext-production-5526.up.railway.app/api/v1"

[[plugins]]
  package = "@netlify/plugin-nextjs"
